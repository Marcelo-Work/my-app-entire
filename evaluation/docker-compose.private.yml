version: '3.8'

services:
  # ---------------------------------------------------------
  # Backend with private seed data
  # ---------------------------------------------------------
  backend-private:
    build:
      # Context is project root (..)
      context: ..
      # Path relative to root (updated per boss's feedback)
      dockerfile: src/backend/Dockerfile
    container_name: digimart-backend-private
    ports:
      - "3001:3000"
    volumes:
      # Mount source code for live reload (optional for tests, but good for debug)
      - ./src/backend:/app
      # Persistent DB volume
      - private-db:/app/db
    environment:
      - DEBUG=True
      - SECRET_KEY=private-test-secret-key
      - DATABASE_URL=sqlite:///db/private.sqlite3
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend-private,frontend-private
      - CORS_ALLOWED_ORIGINS=http://localhost:5174,http://frontend-private:80
      - SEED_DATA=False # We manually seed in command
    command: >
      sh -c "python manage.py migrate --noinput &&
             python evaluation/scripts/seed_private.py &&
             python manage.py runserver 0.0.0.0:3000"
    networks:
      - digimart-private-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------
  # Frontend for private tests
  # ---------------------------------------------------------
  frontend-private:
    build:
      context: ..
      # Path relative to root
      dockerfile: src/frontend/Dockerfile.ecs
    container_name: digimart-frontend-private
    ports:
      - "5174:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:3001/api
      - VITE_APP_ENV=private-test
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - digimart-private-net
    depends_on:
      backend-private:
        condition: service_healthy

  # ---------------------------------------------------------
  # Playwright runner for private tests
  # ---------------------------------------------------------
  playwright-private:
    build:
      context: ..
      dockerfile: Dockerfile.playwright # Assuming this is in root
    container_name: digimart-playwright-private
    volumes:
      - ..:/app
      - ./test-results-private:/app/test-results
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=0
      - VITE_API_BASE_URL=http://backend-private:3000/api
    command: >
      sh -c "sleep 10 &&
             npx playwright test evaluation/private-test-cases/ --reporter=list"
    networks:
      - digimart-private-net
    depends_on:
      backend-private:
        condition: service_healthy
      frontend-private:
        condition: service_healthy
    profiles:
      - test

networks:
  digimart-private-net:
    driver: bridge

volumes:
  private-db:
  node_modules-private: